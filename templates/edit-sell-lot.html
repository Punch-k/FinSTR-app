<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sell Lot - FinSTR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/myshare/home"><img src="/static/img/finstr-logo.png" alt="FinSTR" class="nav-logo"></a>
        </div>
        <ul class="nav-links">
            <li><a href="/myshare/home">Home</a></li>
            <li><a href="/myshare/symbol">Symbol Lookup</a></li>
            <li><a href="/myshare/holdings">Holdings</a></li>
            <li><a href="/myshare/lots">Lots</a></li>
            <li><a href="/myshare/sell-lots">Sell Lots</a></li>
            <li><a href="/myshare/login">Login</a></li>
            <li><a href="/myshare/register">Register</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="form-container">
            <h1>Edit Sell Lot</h1>
            <form id="editSellLotForm">
                <div class="form-group">
                    <label for="shares">Number of Shares Sold</label>
                    <input type="number" id="shares" name="shares" min="1">
                </div>
                <div class="form-group">
                    <label for="sellPrice">Sell Price per Share</label>
                    <input type="number" id="sellPrice" name="sellPrice" min="0.01" step="0.01">
                </div>
                <div class="form-group">
                    <label for="sellDate">Sell Date</label>
                    <input type="date" id="sellDate" name="sellDate">
                </div>
                <button type="submit" class="btn btn-primary">Update Sell Lot</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </main>
    <script src="/static/js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sellLotId = urlParams.get('sellLotId');

        async function loadSellLot() {
            const userId = localStorage.getItem('userId');
            const password = localStorage.getItem('userPassword');

            if (!userId || !password || !sellLotId) {
                window.location.href = '/myshare/login';
                return;
            }

            try {
                const response = await fetch(`/myshare/user/sell-lots?id=${userId}&password=${encodeURIComponent(password)}&sellLotId=${sellLotId}`);
                const data = await response.json();

                if (data.sellLotId) {
                    document.getElementById('shares').value = data.sharesSold || 0;
                    document.getElementById('sellPrice').value = data.sellPrice || '';
                    document.getElementById('sellDate').value = data.sellDate || '';
                }
            } catch (error) {
                document.getElementById('message').className = 'message error';
                document.getElementById('message').textContent = 'Failed to load sell lot';
            }
        }

        document.getElementById('editSellLotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = localStorage.getItem('userId');
            const password = localStorage.getItem('userPassword');
            const messageDiv = document.getElementById('message');

            const formData = new FormData(e.target);
            const data = {
                id: userId,
                password: password,
                sellLotId: sellLotId
            };

            if (formData.get('shares')) data.shares = formData.get('shares');
            if (formData.get('sellPrice')) data.sellPrice = formData.get('sellPrice');
            if (formData.get('sellDate')) data.sellDate = formData.get('sellDate');

            try {
                const response = await fetch('/myshare/user/sell-lots', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.sellLotId) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Sell lot updated successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/myshare/sell-lots';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = result.message || 'Failed to update sell lot';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });

        loadSellLot();
    </script>
</body>
</html>
