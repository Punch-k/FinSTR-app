<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MyShare</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/myshare/home">MyShare</a>
        </div>
        <ul class="nav-links">
            <li><a href="/myshare/home">Home</a></li>
            <li><a href="/myshare/symbol">Symbol Lookup</a></li>
            <li><a href="/myshare/holdings">Holdings</a></li>
            <li><a href="/myshare/lots">Lots</a></li>
            <li><a href="/myshare/sell-lots">Sell Lots</a></li>
            <li><a href="/myshare/login">Login</a></li>
            <li><a href="/myshare/register">Register</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="form-container">
            <h1>Reset Password</h1>
            <form id="resetForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="resetCode">Reset Code</label>
                    <input type="text" id="resetCode" name="resetCode" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="8" maxlength="50">
                </div>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
            <p class="form-footer">
                Remember your password? <a href="/myshare/login">Login</a>
            </p>
            <div id="message" class="message"></div>
        </div>
    </main>
    <script src="/static/js/main.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const resetCode = document.getElementById('resetCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const messageDiv = document.getElementById('message');

            try {
                // First validate the reset code
                const validateResponse = await fetch(`/myshare/user/password-reset/validate?username=${encodeURIComponent(username)}&resetCode=${encodeURIComponent(resetCode)}`);
                const validateData = await validateResponse.json();

                if (validateData.error) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = validateData.message || 'Invalid reset code';
                    return;
                }

                // Then reset the password
                const resetResponse = await fetch('/myshare/user/password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: validateData.id,
                        resetCode: resetCode,
                        newPassword: newPassword
                    })
                });
                const resetData = await resetResponse.json();

                if (resetData.id) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Password reset successful! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = '/myshare/login';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = resetData.message || 'Failed to reset password';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
