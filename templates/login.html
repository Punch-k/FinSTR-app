<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinSTR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/myshare/home"><img src="/static/img/finstr-logo.png" alt="FinSTR" class="nav-logo"></a>
        </div>
        <ul class="nav-links">
            <li><a href="/myshare/home">Home</a></li>
            <li><a href="/myshare/symbol">Symbol Lookup</a></li>
            <li><a href="/myshare/holdings">Holdings</a></li>
            <li><a href="/myshare/lots">Lots</a></li>
            <li><a href="/myshare/sell-lots">Sell Lots</a></li>
            <li><a href="/myshare/login">Login</a></li>
            <li><a href="/myshare/register">Register</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="form-container">
            <h1>Login</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="form-footer">
                <a href="/myshare/recover-password">Forgot Password?</a>
            </p>
            <p class="form-footer">
                Don't have an account? <a href="/myshare/register">Register</a>
            </p>
            <div id="message" class="message"></div>
        </div>
    </main>
    <script src="/static/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch(`/myshare/user/id?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                const data = await response.json();

                if (data.id !== null) {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('username', username);
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/myshare/holdings';
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Invalid username or password';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
